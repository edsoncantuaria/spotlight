name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev

      - name: Install npm dependencies
        run: npm ci

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Spotlight ${{ github.ref_name }}
          releaseBody: |
            Primeira release estável do Spotlight para Linux.

            ## Instalação
            Baixe o `.deb` ou `.AppImage` nos assets abaixo.

            ## Dependências recomendadas
            ```bash
            sudo apt install fd-find wmctrl wtype xdotool git
            ```

            Veja [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md).
          releaseDraft: false
          prerelease: false
          args: --verbose
